name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff coverage textual fastapi "uvicorn[standard]" openai-agents PyYAML "psycopg[binary]" litellm redis pydantic

      - name: Lint boundary and verification suite
        run: |
          ruff check --select E,F,W \
            scripts/governance/check_repo_purity.py \
            tests/test_self_artifact_paths.py \
            tests/test_ci_workflows.py \
            tests/test_bootstrap_and_run.py \
            tests/test_openteam_root_detection.py \
            evals/test_repo_purity.py

      - name: Run tests
        env:
          OPENTEAM_RUNTIME_WORKFLOW_LOOPS_ENABLED: "0"
        run: |
          python -m pytest tests/ evals/ -v --tb=short \
            --ignore=tests/test_crewai_orchestrator.py \
            --ignore=tests/test_crewai_repo_improvement.py \
            --ignore=tests/test_crewai_repo_improvement_delivery.py \
            --ignore=tests/test_crewai_role_registry.py \
            --ignore=tests/test_crewai_runtime.py \
            --ignore=tests/test_crewai_task_registry.py \
            --ignore=tests/test_crewai_team_registry.py \
            --ignore=tests/test_crewai_workflow_registry.py \
            --ignore=tests/test_codex_llm.py

      - name: Run delivery-studio unit tests with coverage
        env:
          OPENTEAM_RUNTIME_WORKFLOW_LOOPS_ENABLED: "0"
        run: |
          coverage run -m pytest \
            tests/test_delivery_studio_runtime.py \
            tests/test_delivery_studio_panel_projection.py \
            tests/test_delivery_studio_review_gate.py \
            tests/test_delivery_coverage_policy.py \
            -v --tb=short
          coverage json -o coverage.json
          python scripts/ci/check_delivery_coverage.py --report coverage.json

  syntax-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check critical files
        run: |
          python -c "
          import py_compile, sys
          files = [
              'openteam',
              'openteam_yaml.py',
              'openteam_common.py',
              'scripts/bootstrap_and_run.py',
              'scaffolds/runtime/orchestrator/app/main.py',
              'scaffolds/runtime/orchestrator/app/runtime_db.py',
          ]
          failed = []
          for f in files:
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  failed.append(str(e))
          if failed:
              print('\n'.join(failed))
              sys.exit(1)
          print('All syntax checks passed')
          "
