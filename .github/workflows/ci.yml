name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff
          python -m pip install -r scaffolds/runtime/orchestrator/requirements.txt || true

      - name: Lint with ruff
        run: ruff check --select E,F,W . --exclude __pycache__ --exclude pytest-of-* || true

      - name: Run tests
        env:
          TEAMOS_RUNTIME_WORKFLOW_LOOPS_ENABLED: "0"
        run: |
          python -m pytest tests/ evals/ -v --tb=short \
            --ignore=tests/test_crewai_orchestrator.py \
            --ignore=tests/test_crewai_repo_improvement.py \
            --ignore=tests/test_crewai_repo_improvement_delivery.py \
            --ignore=tests/test_crewai_role_registry.py \
            --ignore=tests/test_crewai_runtime.py \
            --ignore=tests/test_crewai_task_registry.py \
            --ignore=tests/test_crewai_team_registry.py \
            --ignore=tests/test_crewai_workflow_registry.py \
            --ignore=tests/test_codex_llm.py \
            || true

  syntax-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check critical files
        run: |
          python -c "
          import py_compile, sys
          files = [
              'teamos',
              'team_os_yaml.py',
              'team_os_common.py',
              'scripts/bootstrap_and_run.py',
              'scaffolds/runtime/orchestrator/app/main.py',
              'scaffolds/runtime/orchestrator/app/runtime_db.py',
          ]
          failed = []
          for f in files:
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  failed.append(str(e))
          if failed:
              print('\n'.join(failed))
              sys.exit(1)
          print('All syntax checks passed')
          "
