name: Runtime CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/runtime-ci.yml"
      - ".github/workflows/runtime-image.yml"
      - ".dockerignore"
      - "tooling/**"
      - "scaffolds/runtime/**"
      - "specs/**"
      - "templates/**"
      - "scripts/**"
      - "openteam"
      - "AGENTS.md"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/runtime-ci.yml"
      - ".github/workflows/runtime-image.yml"
      - ".dockerignore"
      - "tooling/**"
      - "scaffolds/runtime/**"
      - "specs/**"
      - "templates/**"
      - "scripts/**"
      - "openteam"
      - "AGENTS.md"
      - "README.md"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scaffolds/runtime/orchestrator/requirements.txt

      - name: Run runtime unit tests
        env:
          OPENTEAM_RUNTIME_WORKFLOW_LOOPS_ENABLED: "0"
        run: |
          python -m unittest \
            tests.test_crewai_runtime \
            tests.test_crewai_orchestrator \
            tests.test_runtime_auto_update \
            tests.test_panel_github_sync \
            tests.test_improvement_store \
            tests.test_openclaw_reporter \
            tests.test_bootstrap_and_run
