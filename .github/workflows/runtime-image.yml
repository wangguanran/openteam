name: Runtime Image

on:
  workflow_run:
    workflows:
      - Runtime CI
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/teamos-control-plane

jobs:
  build:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve crewAI main SHA
        id: crewai
        run: |
          set -euo pipefail
          SHA="$(git ls-remote https://github.com/wangguanran/crewAI.git refs/heads/main | awk '{print $1}')"
          test -n "${SHA}"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ github.event.workflow_run.head_sha }}
          labels: |
            org.opencontainers.image.teamos-crewai-sha=${{ steps.crewai.outputs.sha }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tooling/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TEAMOS_CREWAI_GIT_URL=https://github.com/wangguanran/crewAI.git
            TEAMOS_CREWAI_GIT_REF=main
            TEAMOS_CREWAI_GIT_SHA=${{ steps.crewai.outputs.sha }}
            TEAMOS_NODE_DIST_BASE_URL=https://npmmirror.com/mirrors/node
            TEAMOS_NPM_REGISTRY=https://registry.npmmirror.com
            TEAMOS_APT_MIRROR_URL=https://mirrors.ustc.edu.cn/debian
            TEAMOS_APT_SECURITY_MIRROR_URL=https://mirrors.ustc.edu.cn/debian-security
            TEAMOS_PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
            TEAMOS_PIP_TRUSTED_HOST=pypi.tuna.tsinghua.edu.cn
