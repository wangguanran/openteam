name: Runtime Self Upgrade

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r templates/runtime/orchestrator/requirements.txt

      - name: Run self-upgrade runtime tests
        env:
          TEAMOS_SELF_UPGRADE_AUTO: "0"
        run: |
          python -m unittest \
            tests.test_crewai_runtime \
            tests.test_crewai_orchestrator \
            tests.test_crewai_self_upgrade \
            tests.test_bootstrap_and_run
