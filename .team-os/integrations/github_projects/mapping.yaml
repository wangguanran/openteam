schema_version: 1

# GitHub Projects v2 mapping (view layer only).
# Truth source remains: .team-os/ledger + docs/requirements + control-plane runtime state DB.
#
# This file can be used to:
# - bind TeamOS project_id -> GitHub ProjectV2
# - map required custom fields -> field_id/option_id
# - define status/risk normalization rules
#
# Notes:
# - For dry-run sync, github_* fields can be left empty.
# - For real sync, you must fill owner + project_number OR project_node_id.
# - Never commit tokens/keys. Use env vars only.

github:
  graphql_api_url: "https://api.github.com/graphql"

projects:
  demo:
    project_id: "demo"

    # --- GitHub Project binding ---
    # owner_type: ORG | USER | REPO
    owner_type: "USER"
    # Disabled by default: bind this only when you really want demo data to write to a real Project.
    owner: ""               # e.g. "your-org" or "your-user"
    repo: ""                # only when owner_type=REPO
    project_number: 0       # ProjectV2 number in GitHub UI (required unless project_node_id is set)
    project_node_id: ""     # optional; if set, used directly
    project_url: ""         # optional; informational

    # --- Field mapping ---
    # Fill these once you have a real project. For many users, `mode=full` sync can discover fields by name.
    fields:
      teamos_status:
        name: "TeamOS Status"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          TODO: { name: "Todo", option_id: "" }
          IN_PROGRESS: { name: "In Progress", option_id: "" }
          IN_REVIEW: { name: "In Review", option_id: "" }
          BLOCKED: { name: "Blocked", option_id: "" }
          DONE: { name: "Done", option_id: "" }

      workstreams:
        name: "Workstreams"
        type: "TEXT"
        field_id: ""

      risk:
        name: "Risk"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          LOW: { name: "LOW", option_id: "" }
          MED: { name: "MED", option_id: "" }
          HIGH: { name: "HIGH", option_id: "" }

      need_pm_decision:
        name: "Need PM Decision"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          YES: { name: "Yes", option_id: "" }
          NO: { name: "No", option_id: "" }

      current_focus:
        name: "Current Focus"
        type: "TEXT"
        field_id: ""

      active_agents:
        name: "Active Agents"
        type: "NUMBER"
        field_id: ""

      last_heartbeat:
        name: "Last Heartbeat"
        type: "TEXT"
        field_id: ""

      start_date:
        name: "Start Date"
        type: "DATE"
        field_id: ""

      target_date:
        name: "Target Date"
        type: "DATE"
        field_id: ""

      task_id:
        name: "Task ID"
        type: "TEXT"
        field_id: ""

      links:
        name: "Links"
        type: "TEXT"
        field_id: ""

    # --- Normalization rules ---
    status_mapping:
      # ledger_state -> TeamOS Status option key
      intake: "TODO"
      plan: "TODO"
      todo: "TODO"
      doing: "IN_PROGRESS"
      running: "IN_PROGRESS"
      work: "IN_PROGRESS"
      in_progress: "IN_PROGRESS"
      review: "IN_REVIEW"
      in_review: "IN_REVIEW"
      blocked: "BLOCKED"
      waiting_pm: "BLOCKED"
      need_pm_decision: "BLOCKED"
      done: "DONE"
      closed: "DONE"

    risk_mapping:
      # ledger risk_level -> Risk option key
      R0: "LOW"
      R1: "LOW"
      R2: "MED"
      R3: "HIGH"
      LOW: "LOW"
      MED: "MED"
      MEDIUM: "MED"
      HIGH: "HIGH"

    # --- Item strategy ---
    items:
      tasks:
        mode: "draft_issue"     # draft_issue | issue
        key_field: "task_id"    # uses fields.task_id
      decisions:
        mode: "draft_issue"
        key_prefix: "DECISION:"
      milestones:
        mode: "draft_issue"
        key_prefix: "MILESTONE:"

  teamos:
    project_id: "teamos"

    # Bind to the same Project v2 as the main Team OS dev panel (view-layer).
    owner_type: "USER"
    owner: "wangguanran"
    repo: ""
    project_number: 3
    project_node_id: ""
    project_url: "https://github.com/users/wangguanran/projects/3"

    fields:
      teamos_status:
        name: "TeamOS Status"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          TODO: { name: "Todo", option_id: "" }
          IN_PROGRESS: { name: "In Progress", option_id: "" }
          IN_REVIEW: { name: "In Review", option_id: "" }
          BLOCKED: { name: "Blocked", option_id: "" }
          DONE: { name: "Done", option_id: "" }

      workstreams:
        name: "Workstreams"
        type: "TEXT"
        field_id: ""

      risk:
        name: "Risk"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          LOW: { name: "LOW", option_id: "" }
          MED: { name: "MED", option_id: "" }
          HIGH: { name: "HIGH", option_id: "" }

      need_pm_decision:
        name: "Need PM Decision"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          YES: { name: "Yes", option_id: "" }
          NO: { name: "No", option_id: "" }

      current_focus:
        name: "Current Focus"
        type: "TEXT"
        field_id: ""

      active_agents:
        name: "Active Agents"
        type: "NUMBER"
        field_id: ""

      last_heartbeat:
        name: "Last Heartbeat"
        type: "TEXT"
        field_id: ""

      start_date:
        name: "Start Date"
        type: "DATE"
        field_id: ""

      target_date:
        name: "Target Date"
        type: "DATE"
        field_id: ""

      task_id:
        name: "Task ID"
        type: "TEXT"
        field_id: ""

      links:
        name: "Links"
        type: "TEXT"
        field_id: ""

    status_mapping:
      intake: "TODO"
      plan: "TODO"
      todo: "TODO"
      doing: "IN_PROGRESS"
      running: "IN_PROGRESS"
      work: "IN_PROGRESS"
      in_progress: "IN_PROGRESS"
      review: "IN_REVIEW"
      in_review: "IN_REVIEW"
      blocked: "BLOCKED"
      waiting_pm: "BLOCKED"
      need_pm_decision: "BLOCKED"
      done: "DONE"
      closed: "DONE"

    risk_mapping:
      R0: "LOW"
      R1: "LOW"
      R2: "MED"
      R3: "HIGH"
      LOW: "LOW"
      MED: "MED"
      MEDIUM: "MED"
      HIGH: "HIGH"

    items:
      tasks:
        mode: "draft_issue"
        key_field: "task_id"
      decisions:
        mode: "draft_issue"
        key_prefix: "DECISION:"
      milestones:
        mode: "draft_issue"
        key_prefix: "MILESTONE:"
