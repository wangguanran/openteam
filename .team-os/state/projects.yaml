schema_version: 1
projects:
  - project_id: "DEMO"
    name: "Demo Project (Team OS Mechanism)"
    requirements_dir: "docs/requirements/DEMO"
    workstreams:
      - "backend"
      - "ai"
      - "devops"
      - "web"
    default_workstream_id: "ai"

  - project_id: "demo"
    name: "Demo Project (GitHub Projects Panel)"
    # Note: on case-insensitive filesystems, avoid project_id collisions like "DEMO" vs "demo".
    # This demo uses a distinct directory name to prevent path conflicts while keeping project_id="demo".
    requirements_dir: "docs/requirements/demo_panel"
    plan_dir: "docs/plan/demo"
    workstreams:
      - "backend"
      - "ai"
      - "devops"
      - "web"
    default_workstream_id: "devops"

  - project_id: "teamos"
    name: "Team OS Development"
    requirements_dir: "docs/requirements/teamos"
    plan_dir: "docs/plan/teamos"
    workstreams:
      - "backend"
      - "ai"
      - "devops"
      - "web"
      - "ios"
      - "android"
      - "wechat"
      - "data"
    default_workstream_id: "devops"
