schema_version: 2

# DEPRECATED (governance: repo vs workspace separation)
#
# Team OS repo must contain only Team OS itself. Any project-scoped truth-source
# files (requirements/ledger/logs/prompts/plan/repo workdir) MUST live in the
# Workspace (default: ~/.teamos/workspace).
#
# This file is kept only for backwards compatibility with older docs/scripts.
# It MUST NOT be used as a registry for external projects anymore.

projects:
  - project_id: "teamos"
    name: "Team OS Development (self)"
    # Team OS self truth sources are allowed inside this repo (scope=teamos):
    requirements_dir: "docs/teamos/requirements"
    plan_dir: "docs/plan/teamos"
    workstreams:
      - "backend"
      - "ai"
      - "devops"
      - "web"
      - "ios"
      - "android"
      - "wechat"
      - "data"
    default_workstream_id: "devops"

