services:
  postgres:
    image: postgres:${POSTGRESQL_VERSION:-16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-temporal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-temporal} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_SEEDS=postgres
      - SQL_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    entrypoint: ["/bin/sh"]
    command: /etc/temporal/scripts/setup-postgres.sh
    volumes:
      - ./temporal/scripts:/etc/temporal/scripts:ro
    restart: "no"

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION:-1.29.1}
    restart: unless-stopped
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development-sql.yaml
      - BIND_ON_IP=0.0.0.0
    ports:
      - "127.0.0.1:${TEMPORAL_GRPC_PORT:-7233}:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7233 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    entrypoint: /bin/bash
    command:
      - -c
      - "/etc/temporal/scripts/create-namespace.sh"
    volumes:
      - ./temporal/scripts:/etc/temporal/scripts:ro
    restart: "no"

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.34.0}
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      # Adjust if you host UI elsewhere.
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT:-18081}:8080"

  openhands-agent-server:
    image: ghcr.io/openhands/agent-server:latest-python
    restart: unless-stopped
    # High risk: docker socket grants control over host Docker.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Persist OpenHands secrets across restarts. Generate a strong value in .env (do not commit).
      OH_SECRET_KEY: ${OH_SECRET_KEY:-}
    ports:
      - "127.0.0.1:${OPENHANDS_AGENT_SERVER_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/alive', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  control-plane:
    build:
      context: ./orchestrator
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
      openhands-agent-server:
        condition: service_healthy
    environment:
      TEAM_OS_REPO_PATH: /team-os
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TEMPORAL_ADDRESS: temporal:7233
      OPENHANDS_AGENT_SERVER_URL: http://openhands-agent-server:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-temporal}:${POSTGRES_PASSWORD}@postgres:5432/team_os
      TEAMOS_DEMO_SEED: ${TEAMOS_DEMO_SEED:-0}
      TEAMOS_CODEX_MODEL: ${TEAMOS_CODEX_MODEL:-}
      # Optional override; default is /team-os/.team-os/state/runtime.db
      RUNTIME_DB_PATH: ${RUNTIME_DB_PATH:-}
    ports:
      - "127.0.0.1:${CONTROL_PLANE_PORT:-8787}:8787"
    volumes:
      # Default: read-only repo mount, with minimal writable subpaths layered on top.
      - ../team-os:/team-os:ro
      - ../team-os/.team-os:/team-os/.team-os
      - ../team-os/docs/requirements:/team-os/docs/requirements
      # OAuth: reuse host Codex login state (do not commit; local-only).
      - ${HOME}/.codex:/root/.codex:rw
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
