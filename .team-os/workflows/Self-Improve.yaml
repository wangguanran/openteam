id: "Self-Improve"
name: "Self-Improve (Team OS 自我升级)"
version: "0.1"
description: "复盘 -> 生成改进任务 -> 开 issue/PR -> 验收关闭"
owner_roles:
  - "Process-Guardian"
gates:
  - id: "dual-track"
    rule: "自我升级不阻塞业务交付；但 Hard Rules 不可妥协"
state_machine:
  initial: "retro"
  states:
    - id: "retro"
      next: ["plan"]
    - id: "plan"
      next: ["work"]
    - id: "work"
      next: ["test"]
    - id: "test"
      next: ["closed"]
    - id: "closed"
steps:
  - id: "si-00"
    name: "收集改进点"
    state: "retro"
    role: "Process-Guardian"
    inputs:
      - ".team-os/logs/tasks/<TASK_ID>/07_retro.md"
    outputs:
      - ".team-os/ledger/self_improve/<YYYYMMDD-HHMMSS>_<slug>.md"
    exit_criteria:
      - "改进点转为可执行条目"
  - id: "si-01"
    name: "创建 issue/PR 或 pending 草稿"
    state: "plan"
    role: "Process-Guardian"
    outputs:
      - "GitHub issue/PR (optional)"
      - ".team-os/ledger/team_os_issues_pending/<YYYYMMDD-HHMMSS>_<slug>.md (fallback)"
    exit_criteria:
      - "至少存在可跟踪的改进载体"
  - id: "si-02"
    name: "实现与验证"
    state: "work"
    role: "Developer-Backend"
    outputs:
      - "code changes in Team OS repo"
    exit_criteria:
      - "改进落地"
  - id: "si-03"
    name: "验收关闭"
    state: "test"
    role: "Reviewer"
    outputs:
      - "review approval"
    exit_criteria:
      - "DoD 满足并关闭条目"

