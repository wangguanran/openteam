  status: NEED_PM_DECISION
  title: LLM 认证必须默认使用 OAuth
  text: 控制平面在进行需求提炼/冲突检测/对话响应时，必须默认使用 Codex CLI 的 ChatGPT OAuth（codex login）作为 LLM
    认证方式；不得回退成只支持 API KEY。
  workstreams:
  - ai
  - devops
  priority: P0
  rationale: 避免 secrets 管理风险，统一认证路径，便于团队协作与审计。
  constraints:
  - 不得将任何 token/key 写入 git
  - 未登录时必须显式报错并指引登录
  acceptance:
  - teamos doctor 能检测并提示 codex 登录状态
  - 控制平面在 LLM 调用前检查 codex login status，未登录则拒绝并写入事件
  source: DEMO seed
