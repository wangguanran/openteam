schema_version: 1

# GitHub Projects v2 mapping (view layer only).
# Truth source:
# - scope=openteam: openteam repo (.openteam/ledger, docs/product/openteam/requirements)
# - scope=project:<id>: Workspace (<WORKSPACE>/projects/<id>/state/{ledger,logs,requirements,plan,prompts})
# - control-plane runtime state DB (sqlite/postgres)
#
# This file can be used to:
# - bind OpenTeam project_id -> GitHub ProjectV2
# - map required custom fields -> field_id/option_id
# - define status/risk normalization rules
#
# Notes:
# - For dry-run sync, github_* fields can be left empty.
# - For real sync, you must fill owner + project_number OR project_node_id.
# - Never commit tokens/keys. Use env vars only.

github:
  graphql_api_url: "https://api.github.com/graphql"

projects:
  demo:
    project_id: "demo"

    # --- GitHub Project binding ---
    # owner_type: ORG | USER | REPO
    owner_type: "USER"
    # Disabled by default: bind this only when you really want demo data to write to a real Project.
    owner: ""               # e.g. "your-org" or "your-user"
    repo: ""                # only when owner_type=REPO
    project_number: 0       # ProjectV2 number in GitHub UI (required unless project_node_id is set)
    project_node_id: ""     # optional; if set, used directly
    project_url: ""         # optional; informational

    # --- Field mapping ---
    # Fill these once you have a real project. For many users, `mode=full` sync can discover fields by name.
    fields:
      openteam_status:
        name: "OpenTeam Status"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          TODO: { name: "Todo", option_id: "" }
          IN_PROGRESS: { name: "In Progress", option_id: "" }
          IN_REVIEW: { name: "In Review", option_id: "" }
          BLOCKED: { name: "Blocked", option_id: "" }
          DONE: { name: "Done", option_id: "" }

      workstreams:
        name: "Workstreams"
        type: "TEXT"
        field_id: ""

      risk:
        name: "Risk"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          LOW: { name: "LOW", option_id: "" }
          MED: { name: "MED", option_id: "" }
          HIGH: { name: "HIGH", option_id: "" }

      need_pm_decision:
        name: "Need PM Decision"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          YES: { name: "Yes", option_id: "" }
          NO: { name: "No", option_id: "" }

      current_focus:
        name: "Current Focus"
        type: "TEXT"
        field_id: ""

      active_agents:
        name: "Active Agents"
        type: "NUMBER"
        field_id: ""

      last_heartbeat:
        name: "Last Heartbeat"
        type: "TEXT"
        field_id: ""

      start_date:
        name: "Start Date"
        type: "DATE"
        field_id: ""

      target_date:
        name: "Target Date"
        type: "DATE"
        field_id: ""

      task_id:
        name: "Task ID"
        type: "TEXT"
        field_id: ""

      links:
        name: "Links"
        type: "TEXT"
        field_id: ""

      repo_locator:
        name: "Repo Locator"
        type: "TEXT"
        field_id: ""

      repo_mode:
        name: "Repo Mode"
        type: "TEXT"
        field_id: ""

      request_id:
        name: "Request ID"
        type: "TEXT"
        field_id: ""

      project_name:
        name: "Project"
        type: "TEXT"
        field_id: ""

      priority:
        name: "Priority"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          P0: { name: "P0", option_id: "" }
          P1: { name: "P1", option_id: "" }
          P2: { name: "P2", option_id: "" }

      stage:
        name: "Stage"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          DISCUSSING: { name: "Discussing", option_id: "" }
          AWAITING_APPROVAL: { name: "Awaiting Approval", option_id: "" }
          LOCKED: { name: "Locked", option_id: "" }
          DOCS_UPDATING: { name: "Docs Updating", option_id: "" }
          PLAN_READY: { name: "Plan Ready", option_id: "" }
          IMPLEMENTING: { name: "Implementing", option_id: "" }
          IN_REVIEW: { name: "In Review", option_id: "" }
          CHANGES_REQUESTED: { name: "Changes Requested", option_id: "" }
          CI_RUNNING: { name: "CI Running", option_id: "" }
          READY_TO_MERGE: { name: "Ready to Merge", option_id: "" }
          MERGED: { name: "Merged", option_id: "" }

      spec_approved:
        name: "Spec Approved"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          YES: { name: "Yes", option_id: "" }
          NO: { name: "No", option_id: "" }

      change_request:
        name: "Change Request"
        type: "TEXT"
        field_id: ""

      review_gate:
        name: "Review Gate"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          PENDING: { name: "Pending", option_id: "" }
          PASSED: { name: "Passed", option_id: "" }
          BLOCKED: { name: "Blocked", option_id: "" }

      ci:
        name: "CI"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          PENDING: { name: "Pending", option_id: "" }
          PASSED: { name: "Passed", option_id: "" }
          FAILED: { name: "Failed", option_id: "" }

      release_ready:
        name: "Release Ready"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          YES: { name: "Yes", option_id: "" }
          NO: { name: "No", option_id: "" }

      owner:
        name: "Owner"
        type: "TEXT"
        field_id: ""

      blocked_reason:
        name: "Blocked Reason"
        type: "TEXT"
        field_id: ""

      needs_you:
        name: "Needs You"
        type: "SINGLE_SELECT"
        field_id: ""
        options:
          YES: { name: "Yes", option_id: "" }
          NO: { name: "No", option_id: "" }

      pr:
        name: "PR"
        type: "TEXT"
        field_id: ""

    # --- Normalization rules ---
    status_mapping:
      # ledger_state -> OpenTeam Status option key
      intake: "TODO"
      plan: "TODO"
      todo: "TODO"
      doing: "IN_PROGRESS"
      running: "IN_PROGRESS"
      work: "IN_PROGRESS"
      in_progress: "IN_PROGRESS"
      audit: "IN_PROGRESS"
      docs: "IN_PROGRESS"
      review: "IN_REVIEW"
      in_review: "IN_REVIEW"
      needs_clarification: "BLOCKED"
      merge_conflict: "BLOCKED"
      blocked: "BLOCKED"
      waiting_pm: "BLOCKED"
      need_pm_decision: "BLOCKED"
      done: "DONE"
      closed: "DONE"

    risk_mapping:
      # ledger risk_level -> Risk option key
      R0: "LOW"
      R1: "LOW"
      R2: "MED"
      R3: "HIGH"
      LOW: "LOW"
      MED: "MED"
      MEDIUM: "MED"
      HIGH: "HIGH"

    # --- Item strategy ---
    items:
      tasks:
        mode: "draft_issue"     # draft_issue | issue
        key_field: "task_id"    # uses fields.task_id
      decisions:
        mode: "draft_issue"
        key_prefix: "DECISION:"
      milestones:
        mode: "draft_issue"
        key_prefix: "MILESTONE:"

  openteam:
    project_id: "openteam"

    # Bind to the same Project v2 as the main OpenTeam dev panel (view-layer).
    owner_type: "USER"
    owner: "openteam-dev"
