services:
  postgres:
    image: postgres:${POSTGRESQL_VERSION:-16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamos} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  openhands-agent-server:
    image: ghcr.io/openhands/agent-server:latest-python
    restart: unless-stopped
    # High risk: docker socket grants control over host Docker.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Persist OpenHands secrets across restarts. Generate a strong value in .env (do not commit).
      OH_SECRET_KEY: ${OH_SECRET_KEY:-}
    ports:
      - "127.0.0.1:${OPENHANDS_AGENT_SERVER_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/alive', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  control-plane:
    build:
      context: ./orchestrator
      args:
        TEAMOS_PYTHON_BASE_IMAGE: ${TEAMOS_PYTHON_BASE_IMAGE:-python:3.11-slim-bookworm}
        HTTP_PROXY: ${TEAMOS_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${TEAMOS_BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${TEAMOS_BUILD_ALL_PROXY:-}
        NO_PROXY: ${TEAMOS_BUILD_NO_PROXY:-}
        http_proxy: ${TEAMOS_BUILD_HTTP_PROXY:-}
        https_proxy: ${TEAMOS_BUILD_HTTPS_PROXY:-}
        all_proxy: ${TEAMOS_BUILD_ALL_PROXY:-}
        no_proxy: ${TEAMOS_BUILD_NO_PROXY:-}
        TEAMOS_CREWAI_GIT_URL: ${TEAMOS_CREWAI_GIT_URL:-https://github.com/wangguanran/crewAI.git}
        TEAMOS_CREWAI_GIT_REF: ${TEAMOS_CREWAI_GIT_REF:-main}
        TEAMOS_NODE_VERSION: ${TEAMOS_NODE_VERSION:-24.12.0}
        TEAMOS_NODE_DIST_BASE_URL: ${TEAMOS_NODE_DIST_BASE_URL:-https://npmmirror.com/mirrors/node}
        TEAMOS_OPENCLAW_VERSION: ${TEAMOS_OPENCLAW_VERSION:-2026.3.2}
        TEAMOS_NPM_REGISTRY: ${TEAMOS_NPM_REGISTRY:-https://registry.npmmirror.com}
        TEAMOS_APT_MIRROR_URL: ${TEAMOS_APT_MIRROR_URL:-http://deb.debian.org/debian}
        TEAMOS_APT_SECURITY_MIRROR_URL: ${TEAMOS_APT_SECURITY_MIRROR_URL:-http://deb.debian.org/debian-security}
        TEAMOS_PIP_INDEX_URL: ${TEAMOS_PIP_INDEX_URL:-https://pypi.org/simple}
        TEAMOS_PIP_TRUSTED_HOST: ${TEAMOS_PIP_TRUSTED_HOST:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openhands-agent-server:
        condition: service_healthy
    environment:
      TEAM_OS_REPO_PATH: /team-os
      # Runtime root for all runtime-generated state/artifacts.
      TEAMOS_RUNTIME_ROOT: /teamos-runtime
      # Workspace root (project truth sources live here; must be outside the team-os git repo).
      TEAMOS_WORKSPACE_ROOT: /teamos-workspace
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # GitHub auth: recommended to set from `gh auth token` (OAuth); do not commit real values.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENHANDS_AGENT_SERVER_URL: http://openhands-agent-server:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD}@postgres:5432/team_os
      TEAMOS_DB_URL: postgresql://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD}@postgres:5432/team_os
      TEAMOS_DEMO_SEED: ${TEAMOS_DEMO_SEED:-0}
      TEAMOS_CODEX_MODEL: ${TEAMOS_CODEX_MODEL:-}
      TEAMOS_SELF_UPGRADE_AUTO: ${TEAMOS_SELF_UPGRADE_AUTO:-1}
      TEAMOS_SELF_UPGRADE_CONTINUOUS: ${TEAMOS_SELF_UPGRADE_CONTINUOUS:-1}
      TEAMOS_SELF_UPGRADE_LOOP_INTERVAL_SEC: ${TEAMOS_SELF_UPGRADE_LOOP_INTERVAL_SEC:-300}
      TEAMOS_SELF_UPGRADE_LOOP_INITIAL_DELAY_SEC: ${TEAMOS_SELF_UPGRADE_LOOP_INITIAL_DELAY_SEC:-90}
      TEAMOS_SELF_UPGRADE_DISCUSSION_AUTO: ${TEAMOS_SELF_UPGRADE_DISCUSSION_AUTO:-1}
      TEAMOS_SELF_UPGRADE_DISCUSSION_INTERVAL_SEC: ${TEAMOS_SELF_UPGRADE_DISCUSSION_INTERVAL_SEC:-90}
      TEAMOS_SELF_UPGRADE_DISCUSSION_INITIAL_DELAY_SEC: ${TEAMOS_SELF_UPGRADE_DISCUSSION_INITIAL_DELAY_SEC:-30}
      TEAMOS_SELF_UPGRADE_DELIVERY_AUTO: ${TEAMOS_SELF_UPGRADE_DELIVERY_AUTO:-1}
      TEAMOS_SELF_UPGRADE_DELIVERY_INTERVAL_SEC: ${TEAMOS_SELF_UPGRADE_DELIVERY_INTERVAL_SEC:-180}
      TEAMOS_SELF_UPGRADE_DELIVERY_INITIAL_DELAY_SEC: ${TEAMOS_SELF_UPGRADE_DELIVERY_INITIAL_DELAY_SEC:-45}
      TEAMOS_SELF_UPGRADE_DELIVERY_MAX_TASKS_PER_SWEEP: ${TEAMOS_SELF_UPGRADE_DELIVERY_MAX_TASKS_PER_SWEEP:-1}
      TEAMOS_SELF_UPGRADE_DELIVERY_MAX_ATTEMPTS: ${TEAMOS_SELF_UPGRADE_DELIVERY_MAX_ATTEMPTS:-2}
      TEAMOS_SELF_UPGRADE_SHIP_ENABLED: ${TEAMOS_SELF_UPGRADE_SHIP_ENABLED:-1}
      TEAMOS_SELF_UPGRADE_FEATURE_COOLDOWN_HOURS: ${TEAMOS_SELF_UPGRADE_FEATURE_COOLDOWN_HOURS:-1}
      TEAMOS_SELF_UPGRADE_QUALITY_COOLDOWN_HOURS: ${TEAMOS_SELF_UPGRADE_QUALITY_COOLDOWN_HOURS:-1}
      TEAMOS_SELF_UPGRADE_PROCESS_COOLDOWN_HOURS: ${TEAMOS_SELF_UPGRADE_PROCESS_COOLDOWN_HOURS:-24}
      TEAMOS_SELF_UPGRADE_FAILURE_BACKOFF_HOURS: ${TEAMOS_SELF_UPGRADE_FAILURE_BACKOFF_HOURS:-1}
      TEAMOS_SELF_UPGRADE_MAX_FINDINGS: ${TEAMOS_SELF_UPGRADE_MAX_FINDINGS:-3}
      CREWAI_OPENAI_AUTH_MODE: ${CREWAI_OPENAI_AUTH_MODE:-oauth_codex}
      TEAMOS_CREWAI_MODEL: ${TEAMOS_CREWAI_MODEL:-openai-codex/gpt-5.3-codex}
      TEAMOS_OPENCLAW_AUTO: ${TEAMOS_OPENCLAW_AUTO:-0}
      TEAMOS_OPENCLAW_INTERVAL_SEC: ${TEAMOS_OPENCLAW_INTERVAL_SEC:-30}
      TEAMOS_OPENCLAW_INITIAL_DELAY_SEC: ${TEAMOS_OPENCLAW_INITIAL_DELAY_SEC:-10}
      TEAMOS_OPENCLAW_CHANNEL: ${TEAMOS_OPENCLAW_CHANNEL:-telegram}
      TEAMOS_OPENCLAW_TARGET: ${TEAMOS_OPENCLAW_TARGET:-}
      TEAMOS_OPENCLAW_GATEWAY_MODE: ${TEAMOS_OPENCLAW_GATEWAY_MODE:-}
      TEAMOS_OPENCLAW_GATEWAY_URL: ${TEAMOS_OPENCLAW_GATEWAY_URL:-}
      TEAMOS_OPENCLAW_GATEWAY_TOKEN: ${TEAMOS_OPENCLAW_GATEWAY_TOKEN:-}
      TEAMOS_OPENCLAW_GATEWAY_PASSWORD: ${TEAMOS_OPENCLAW_GATEWAY_PASSWORD:-}
      TEAMOS_OPENCLAW_GATEWAY_TRANSPORT: ${TEAMOS_OPENCLAW_GATEWAY_TRANSPORT:-direct}
      TEAMOS_OPENCLAW_STATE_DIR: ${TEAMOS_OPENCLAW_STATE_DIR:-/teamos-runtime/state/openclaw-client}
      TEAMOS_OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${TEAMOS_OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      TEAMOS_OPENCLAW_PATH_PATTERNS: ${TEAMOS_OPENCLAW_PATH_PATTERNS:-*}
      TEAMOS_OPENCLAW_EVENT_TYPES: ${TEAMOS_OPENCLAW_EVENT_TYPES:-SELF_UPGRADE_*}
      TEAMOS_OPENCLAW_EXCLUDE_EVENT_TYPES: ${TEAMOS_OPENCLAW_EXCLUDE_EVENT_TYPES:-}
      TEAMOS_OPENCLAW_MESSAGE_PREFIX: ${TEAMOS_OPENCLAW_MESSAGE_PREFIX:-[TeamOS 上报]}
      OPENCLAW_CONFIG_DIR: /root/.openclaw
      HTTP_PROXY: ${TEAMOS_RUNTIME_HTTP_PROXY:-}
      HTTPS_PROXY: ${TEAMOS_RUNTIME_HTTPS_PROXY:-}
      ALL_PROXY: ${TEAMOS_RUNTIME_ALL_PROXY:-}
      NO_PROXY: ${TEAMOS_RUNTIME_NO_PROXY:-localhost,127.0.0.1,host.docker.internal,postgres,openhands-agent-server,control-plane}
      http_proxy: ${TEAMOS_RUNTIME_HTTP_PROXY:-}
      https_proxy: ${TEAMOS_RUNTIME_HTTPS_PROXY:-}
      all_proxy: ${TEAMOS_RUNTIME_ALL_PROXY:-}
      no_proxy: ${TEAMOS_RUNTIME_NO_PROXY:-localhost,127.0.0.1,host.docker.internal,postgres,openhands-agent-server,control-plane}
      # GitHub Projects panel sync (view-layer)
      TEAMOS_PANEL_GH_AUTO_SYNC: ${TEAMOS_PANEL_GH_AUTO_SYNC:-0}
      TEAMOS_PANEL_GH_WRITE_ENABLED: ${TEAMOS_PANEL_GH_WRITE_ENABLED:-0}
      TEAMOS_PANEL_GH_SYNC_INTERVAL_SEC: ${TEAMOS_PANEL_GH_SYNC_INTERVAL_SEC:-60}
      TEAMOS_PANEL_GH_SYNC_DEBOUNCE_SEC: ${TEAMOS_PANEL_GH_SYNC_DEBOUNCE_SEC:-30}
      CREWAI_DISABLE_TELEMETRY: ${CREWAI_DISABLE_TELEMETRY:-1}
      # Runtime DB path (runtime-only; host path under team-os-runtime/state).
      RUNTIME_DB_PATH: ${RUNTIME_DB_PATH:-/teamos-runtime/state/runtime.db}
    ports:
      - "127.0.0.1:${CONTROL_PLANE_PORT:-8787}:8787"
    volumes:
      # Default: read-only repo mount, with minimal writable subpaths layered on top.
      - ../team-os:/team-os:ro
      - ./state/teamos:/team-os/.team-os:rw
      - ../team-os/docs:/team-os/docs
      # Runtime root persistence (all runtime outputs stay in team-os-runtime).
      - ./state:/teamos-runtime/state:rw
      - ./hub:/teamos-runtime/hub:rw
      - ./workspace:/teamos-runtime/workspace:rw
      - ./tmp:/teamos-runtime/tmp:rw
      - ./cache:/teamos-runtime/cache:rw
      # Workspace: all project truth sources live here (must be OUTSIDE the team-os git repo).
      - ${HOME}/.teamos/workspace:/teamos-workspace:rw
      # OAuth: reuse host Codex login state (do not commit; local-only).
      - ${HOME}/.codex:/root/.codex:rw
      # OpenClaw: reuse local channel/gateway/account configuration (read-only).
      - ${HOME}/.openclaw:/root/.openclaw:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
