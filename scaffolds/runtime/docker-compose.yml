name: ${TEAMOS_DOCKER_PROJECT_NAME:-team-os-runtime}

services:
  postgres:
    image: postgres:${POSTGRESQL_VERSION:-16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team_os}
      POSTGRES_USER: ${POSTGRES_USER:-teamos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamos-local-dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamos} -d ${POSTGRES_DB:-team_os}"]
      interval: 5s
      timeout: 5s
      retries: 10

  openhands-agent-server:
    image: ghcr.io/openhands/agent-server:latest-python
    restart: unless-stopped
    # High risk: docker socket grants control over host Docker.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Persist OpenHands secrets across restarts. Generate a strong value in .env (do not commit).
      OH_SECRET_KEY: ${OH_SECRET_KEY:-}
    ports:
      - "127.0.0.1:${OPENHANDS_AGENT_SERVER_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/alive', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  control-plane:
    image: ${TEAMOS_CONTROL_PLANE_IMAGE:-ghcr.io/wangguanran/teamos-control-plane:main}
    working_dir: /team-os/scaffolds/runtime/orchestrator
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8787"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openhands-agent-server:
        condition: service_healthy
    environment:
      TEAM_OS_REPO_PATH: /team-os
      # Runtime root for all runtime-generated state/artifacts.
      TEAMOS_RUNTIME_ROOT: /teamos-runtime
      # Workspace root (project truth sources live here; must be outside the team-os git repo).
      TEAMOS_WORKSPACE_ROOT: /teamos-workspace
      TEAMOS_LLM_API_KEY: ${TEAMOS_LLM_API_KEY:-}
      TEAMOS_LLM_BASE_URL: ${TEAMOS_LLM_BASE_URL:-}
      # GitHub auth: recommended to set from `gh auth token` (OAuth); do not commit real values.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENHANDS_AGENT_SERVER_URL: http://openhands-agent-server:8000
      DATABASE_URL: ${TEAMOS_DB_URL:-postgresql://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos-local-dev}@postgres:5432/${POSTGRES_DB:-team_os}}
      TEAMOS_DB_URL: ${TEAMOS_DB_URL:-postgresql://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos-local-dev}@postgres:5432/${POSTGRES_DB:-team_os}}
      TEAMOS_DEMO_SEED: ${TEAMOS_DEMO_SEED:-0}
      TEAMOS_CODEX_MODEL: ${TEAMOS_CODEX_MODEL:-}
      TEAMOS_REPO_IMPROVEMENT_AUTO: ${TEAMOS_REPO_IMPROVEMENT_AUTO:-1}
      TEAMOS_REPO_IMPROVEMENT_STARTUP_CONCURRENCY: ${TEAMOS_REPO_IMPROVEMENT_STARTUP_CONCURRENCY:-10}
      TEAMOS_REPO_IMPROVEMENT_CONTINUOUS: ${TEAMOS_REPO_IMPROVEMENT_CONTINUOUS:-1}
      TEAMOS_REPO_IMPROVEMENT_DISCOVERY_CONCURRENCY: ${TEAMOS_REPO_IMPROVEMENT_DISCOVERY_CONCURRENCY:-10}
      TEAMOS_REPO_IMPROVEMENT_LOOP_INTERVAL_SEC: ${TEAMOS_REPO_IMPROVEMENT_LOOP_INTERVAL_SEC:-300}
      TEAMOS_REPO_IMPROVEMENT_LOOP_INITIAL_DELAY_SEC: ${TEAMOS_REPO_IMPROVEMENT_LOOP_INITIAL_DELAY_SEC:-90}
      TEAMOS_REPO_IMPROVEMENT_DISCUSSION_AUTO: ${TEAMOS_REPO_IMPROVEMENT_DISCUSSION_AUTO:-1}
      TEAMOS_REPO_IMPROVEMENT_DISCUSSION_CONCURRENCY: ${TEAMOS_REPO_IMPROVEMENT_DISCUSSION_CONCURRENCY:-10}
      TEAMOS_REPO_IMPROVEMENT_DISCUSSION_INTERVAL_SEC: ${TEAMOS_REPO_IMPROVEMENT_DISCUSSION_INTERVAL_SEC:-90}
      TEAMOS_REPO_IMPROVEMENT_DISCUSSION_INITIAL_DELAY_SEC: ${TEAMOS_REPO_IMPROVEMENT_DISCUSSION_INITIAL_DELAY_SEC:-30}
      TEAMOS_REPO_IMPROVEMENT_DELIVERY_AUTO: ${TEAMOS_REPO_IMPROVEMENT_DELIVERY_AUTO:-1}
      TEAMOS_REPO_IMPROVEMENT_DELIVERY_INTERVAL_SEC: ${TEAMOS_REPO_IMPROVEMENT_DELIVERY_INTERVAL_SEC:-180}
      TEAMOS_REPO_IMPROVEMENT_DELIVERY_INITIAL_DELAY_SEC: ${TEAMOS_REPO_IMPROVEMENT_DELIVERY_INITIAL_DELAY_SEC:-45}
      TEAMOS_REPO_IMPROVEMENT_DELIVERY_CONCURRENCY: ${TEAMOS_REPO_IMPROVEMENT_DELIVERY_CONCURRENCY:-10}
      TEAMOS_REPO_IMPROVEMENT_DELIVERY_MAX_ATTEMPTS: ${TEAMOS_REPO_IMPROVEMENT_DELIVERY_MAX_ATTEMPTS:-2}
      TEAMOS_REPO_IMPROVEMENT_SHIP_ENABLED: ${TEAMOS_REPO_IMPROVEMENT_SHIP_ENABLED:-1}
      TEAMOS_REPO_IMPROVEMENT_FEATURE_COOLDOWN_HOURS: ${TEAMOS_REPO_IMPROVEMENT_FEATURE_COOLDOWN_HOURS:-1}
      TEAMOS_REPO_IMPROVEMENT_QUALITY_COOLDOWN_HOURS: ${TEAMOS_REPO_IMPROVEMENT_QUALITY_COOLDOWN_HOURS:-1}
      TEAMOS_REPO_IMPROVEMENT_PROCESS_COOLDOWN_HOURS: ${TEAMOS_REPO_IMPROVEMENT_PROCESS_COOLDOWN_HOURS:-24}
      TEAMOS_REPO_IMPROVEMENT_FAILURE_BACKOFF_HOURS: ${TEAMOS_REPO_IMPROVEMENT_FAILURE_BACKOFF_HOURS:-1}
      TEAMOS_REPO_IMPROVEMENT_MAX_FINDINGS: ${TEAMOS_REPO_IMPROVEMENT_MAX_FINDINGS:-3}
      TEAMOS_RUNTIME_FILE_MIRROR: ${TEAMOS_RUNTIME_FILE_MIRROR:-1}
      CREWAI_OPENAI_AUTH_MODE: ${CREWAI_OPENAI_AUTH_MODE:-oauth_codex}
      TEAMOS_LLM_MODEL: ${TEAMOS_LLM_MODEL:-openrouter/openai/gpt-5.4}
      TEAMOS_CREWAI_REASONING_EFFORT: ${TEAMOS_CREWAI_REASONING_EFFORT:-xhigh}
      TEAMOS_CREWAI_DISABLE_PROXY_FOR_OAUTH_CODEX: ${TEAMOS_CREWAI_DISABLE_PROXY_FOR_OAUTH_CODEX:-1}
      TEAMOS_OPENCLAW_AUTO: ${TEAMOS_OPENCLAW_AUTO:-0}
      TEAMOS_OPENCLAW_INTERVAL_SEC: ${TEAMOS_OPENCLAW_INTERVAL_SEC:-30}
      TEAMOS_OPENCLAW_INITIAL_DELAY_SEC: ${TEAMOS_OPENCLAW_INITIAL_DELAY_SEC:-10}
      TEAMOS_OPENCLAW_CHANNEL: ${TEAMOS_OPENCLAW_CHANNEL:-telegram}
      TEAMOS_OPENCLAW_TARGET: ${TEAMOS_OPENCLAW_TARGET:-}
      TEAMOS_OPENCLAW_GATEWAY_MODE: ${TEAMOS_OPENCLAW_GATEWAY_MODE:-}
      TEAMOS_OPENCLAW_GATEWAY_URL: ${TEAMOS_OPENCLAW_GATEWAY_URL:-}
      TEAMOS_OPENCLAW_GATEWAY_TOKEN: ${TEAMOS_OPENCLAW_GATEWAY_TOKEN:-}
      TEAMOS_OPENCLAW_GATEWAY_PASSWORD: ${TEAMOS_OPENCLAW_GATEWAY_PASSWORD:-}
      TEAMOS_OPENCLAW_GATEWAY_TRANSPORT: ${TEAMOS_OPENCLAW_GATEWAY_TRANSPORT:-direct}
      TEAMOS_OPENCLAW_STATE_DIR: ${TEAMOS_OPENCLAW_STATE_DIR:-/teamos-runtime/state/openclaw-client}
      TEAMOS_OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${TEAMOS_OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      TEAMOS_OPENCLAW_PATH_PATTERNS: ${TEAMOS_OPENCLAW_PATH_PATTERNS:-*}
      TEAMOS_OPENCLAW_EVENT_TYPES: ${TEAMOS_OPENCLAW_EVENT_TYPES:-REPO_IMPROVEMENT_*}
      TEAMOS_OPENCLAW_EXCLUDE_EVENT_TYPES: ${TEAMOS_OPENCLAW_EXCLUDE_EVENT_TYPES:-}
      TEAMOS_OPENCLAW_MESSAGE_PREFIX: ${TEAMOS_OPENCLAW_MESSAGE_PREFIX:-[TeamOS 上报]}
      OPENCLAW_CONFIG_DIR: /root/.openclaw
      HTTP_PROXY: ${TEAMOS_RUNTIME_HTTP_PROXY:-}
      HTTPS_PROXY: ${TEAMOS_RUNTIME_HTTPS_PROXY:-}
      ALL_PROXY: ${TEAMOS_RUNTIME_ALL_PROXY:-}
      NO_PROXY: ${TEAMOS_RUNTIME_NO_PROXY:-localhost,127.0.0.1,host.docker.internal,postgres,openhands-agent-server,control-plane,chatgpt.com,.chatgpt.com,api.openai.com,.openai.com,openrouter.ai,api.openrouter.ai,api.openrouter.com}
      http_proxy: ${TEAMOS_RUNTIME_HTTP_PROXY:-}
      https_proxy: ${TEAMOS_RUNTIME_HTTPS_PROXY:-}
      all_proxy: ${TEAMOS_RUNTIME_ALL_PROXY:-}
      no_proxy: ${TEAMOS_RUNTIME_NO_PROXY:-localhost,127.0.0.1,host.docker.internal,postgres,openhands-agent-server,control-plane,chatgpt.com,.chatgpt.com,api.openai.com,.openai.com,openrouter.ai,api.openrouter.ai,api.openrouter.com}
      # GitHub Projects panel sync (view-layer)
      TEAMOS_PANEL_GH_AUTO_SYNC: ${TEAMOS_PANEL_GH_AUTO_SYNC:-0}
      TEAMOS_PANEL_GH_WRITE_ENABLED: ${TEAMOS_PANEL_GH_WRITE_ENABLED:-0}
      TEAMOS_PANEL_GH_SYNC_INTERVAL_SEC: ${TEAMOS_PANEL_GH_SYNC_INTERVAL_SEC:-60}
      TEAMOS_PANEL_GH_SYNC_DEBOUNCE_SEC: ${TEAMOS_PANEL_GH_SYNC_DEBOUNCE_SEC:-30}
      CREWAI_DISABLE_TELEMETRY: ${CREWAI_DISABLE_TELEMETRY:-1}
      # Runtime DB path (runtime-only; persisted in Docker named volumes).
      RUNTIME_DB_PATH: ${RUNTIME_DB_PATH:-/teamos-runtime/state/runtime.db}
    ports:
      - "127.0.0.1:${CONTROL_PLANE_PORT:-8787}:8787"
    volumes:
      # Default: read-only repo mount, with minimal writable subpaths layered on top.
      - ${TEAM_OS_REPO_PATH:-../team-os}:/team-os:ro
      - repo_overlay_data:/team-os/.team-os:rw
      - ${TEAM_OS_REPO_PATH:-../team-os}/docs:/team-os/docs
      # Runtime root persistence now uses Docker named volumes.
      - runtime_state_data:/teamos-runtime/state:rw
      - runtime_hub_data:/teamos-runtime/hub:rw
      - runtime_workspace_data:/teamos-runtime/workspace:rw
      - runtime_tmp_data:/teamos-runtime/tmp:rw
      - runtime_cache_data:/teamos-runtime/cache:rw
      # Workspace: all project truth sources live here (must be OUTSIDE the team-os git repo).
      - ${HOME}/.teamos/workspace:/teamos-workspace:rw
      # OAuth: reuse host Codex login state (do not commit; local-only).
      - ${HOME}/.codex:/root/.codex:rw
      # OpenClaw: reuse local channel/gateway/account configuration (read-only).
      - ${HOME}/.openclaw:/root/.openclaw:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
    name: ${TEAMOS_DOCKER_VOLUME_PREFIX:-team-os-runtime}_postgres_data
  repo_overlay_data:
    name: ${TEAMOS_DOCKER_VOLUME_PREFIX:-team-os-runtime}_repo_overlay
  runtime_state_data:
    name: ${TEAMOS_DOCKER_VOLUME_PREFIX:-team-os-runtime}_state
  runtime_hub_data:
    name: ${TEAMOS_DOCKER_VOLUME_PREFIX:-team-os-runtime}_hub
  runtime_workspace_data:
    name: ${TEAMOS_DOCKER_VOLUME_PREFIX:-team-os-runtime}_runtime_workspace
  runtime_tmp_data:
    name: ${TEAMOS_DOCKER_VOLUME_PREFIX:-team-os-runtime}_tmp
  runtime_cache_data:
    name: ${TEAMOS_DOCKER_VOLUME_PREFIX:-team-os-runtime}_cache
