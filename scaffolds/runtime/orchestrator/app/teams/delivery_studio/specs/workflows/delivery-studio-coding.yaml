workflow_id: delivery-studio-coding
engine: ""
lane: delivery
phase: coding
display_name_zh: 交付实施流程
enabled: true
description: Execute mobile/admin/backend workstreams after approval, docs, contracts, and plan are ready.
task_source: direct_task
requires_user_confirmation: false
materialize_requires_approval: false
default_version_bump: none
baseline_action_default: delivery_coding
stages:
  - delivery
process:
  mode: sequential
  verbose: false
agents:
  - agent_id: delivery_lead
    role_id: Scheduler-Agent
  - agent_id: mobile_owner
    role_id: Coding-Agent
    backstory: You own apps/mobile and stay inside the frozen design package and contract baseline.
  - agent_id: admin_owner
    role_id: Coding-Agent
    backstory: You own apps/admin and keep the admin surface independent from the app UI.
  - agent_id: backend_owner
    role_id: Coding-Agent
    backstory: You own services/api and treat packages/contracts as the shared truth source.
  - agent_id: docs_owner
    role_id: Documentation-Agent
  - agent_id: qa_owner
    role_id: QA-Agent
tasks:
  - task_id: delivery_pipeline
    kind: skill
    skill_id: team.run-coding-pipeline
