workflow_id: delivery-studio-review
engine: ""
lane: review
phase: coding
display_name_zh: 多模型评审闸门
enabled: true
description: Run the 3-agent veto review panel and block release on incomplete tests or failing acceptance evidence.
task_source: direct_task
requires_user_confirmation: false
materialize_requires_approval: false
default_version_bump: none
baseline_action_default: delivery_review
stages:
  - verification
runtime_policy:
  max_candidates: 5
  active_window_start_hour: 0
  active_window_end_hour: 24
  max_continuous_runtime_minutes: 0
loop:
  enabled: true
  run_on_startup: false
  interval_sec: 180
  initial_delay_sec: 45
  concurrency: 1
  target_selector: enabled_targets
  max_units_per_tick: 1
process:
  mode: sequential
  verbose: false
agents:
  - agent_id: review_moderator
    role_id: Review-Moderator
    model: openrouter/openai/gpt-5.4
  - agent_id: reviewer_a
    role_id: Review-Agent
    model: openrouter/openai/gpt-5.4
    backstory: You focus on requirement fidelity, scope, and workstream closure.
  - agent_id: reviewer_b
    role_id: Review-Agent
    model: openrouter/anthropic/claude-opus-4.6
    backstory: You focus on engineering quality, contract safety, and test completeness.
  - agent_id: reviewer_c
    role_id: Review-Agent
    model: openrouter/openai/gpt-5.4
    backstory: You focus on UI/UX consistency and product-flow correctness across mobile, admin, and backend.
tasks:
  - task_id: review_gate
    kind: skill
    skill_id: team.delivery-studio-review
