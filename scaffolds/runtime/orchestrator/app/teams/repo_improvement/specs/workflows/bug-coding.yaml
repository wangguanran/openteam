workflow_id: bug-coding
lane: bug
phase: coding
display_name_zh: 缺陷修复流程
enabled: true
description: Deliver queued bug tasks through audit, validation, coding, review, QA, and release.
task_source: direct_task
requires_user_confirmation: false
materialize_requires_approval: false
default_version_bump: patch
baseline_action_default: patch_release
stages:
  - delivery
runtime_policy:
  max_candidates: 1
  active_window_start_hour: 0
  active_window_end_hour: 24
  max_continuous_runtime_minutes: 0
loop:
  enabled: true
  run_on_startup: false
  interval_sec: 180
  initial_delay_sec: 45
  concurrency: 1
  target_selector: enabled_targets
  max_units_per_tick: 1
process:
  mode: sequential
  verbose: false
agents:
  - agent_id: scheduler
    role_id: Scheduler-Agent
  - agent_id: owner
    role_id: Bugfix-Coding-Agent
  - agent_id: reviewer
    role_id: Review-Agent
  - agent_id: qa_gate
    role_id: QA-Agent
  - agent_id: docs
    role_id: Documentation-Agent
  - agent_id: release
    role_id: Release-Agent
tasks:
  - task_id: delivery_pipeline
    kind: skill
    skill_id: delivery.run-task-pipeline
