workflow_id: bug-finding
lane: bug
phase: finding
display_name_zh: 缺陷查找流程
enabled: true
description: Discover actionable bugs and convert them into coding tasks.
task_source: direct_task
requires_user_confirmation: false
materialize_requires_approval: false
default_version_bump: patch
baseline_action_default: patch_release
stages:
  - planning
runtime_policy:
  max_candidates: 3
  active_window_start_hour: 0
  active_window_end_hour: 24
  max_continuous_runtime_minutes: 0
  dormant_after_zero_scans: 3
  cooldown_hours: 0
loop:
  enabled: true
  run_on_startup: true
  interval_sec: 300
  initial_delay_sec: 60
  concurrency: 1
  target_selector: enabled_targets
  max_units_per_tick: 1
process:
  mode: sequential
  verbose: false
agents:
  - agent_id: scanner
    role_id: Test-Manager
    tool_profile: qa
  - agent_id: drafter
    role_id: Issue-Drafter
  - agent_id: reviewer
    role_id: Plan-Review-Agent
  - agent_id: qa_gate
    role_id: Plan-QA-Agent
tasks:
  - task_id: prepare_context
    kind: skill
    skill_id: repo.collect-context
  - task_id: bug_scan
    kind: crewai_task
    agent_id: scanner
    output_model: StructuredBugScanResult
    inputs:
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
      max_findings: $tasks.prepare_context.outputs.max_findings
      bug_scan_dormant: $tasks.prepare_context.outputs.bug_scan_dormant
    description_template: |
      Analyze the repository context as a QA/test lead and return JSON matching StructuredBugScanResult.
      Rules:
      - Only report bugs that are currently provable from the supplied repository context, baseline checks, and source evidence.
      - Return at most {max_findings} bug findings. If max_findings is 0, return every well-supported bug candidate you can justify.
      - Never turn missing test coverage, code smell, or vague suspicion into a bug.
      - If bug_scan_dormant is true, prefer returning 0 findings unless there is fresh strong evidence.
      - All user-facing natural language fields must use Simplified Chinese.

      Repository context:
      {repo_context_blob}
    expected_output: Structured bug findings JSON.
  - task_id: draft_plan
    kind: crewai_task
    agent_id: drafter
    output_model: UpgradePlan
    inputs:
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
      bug_scan: $tasks.bug_scan.outputs.raw
      current_version: $tasks.prepare_context.outputs.current_version
    description_template: |
      Transform the bug scan result into a final UpgradePlan JSON.
      Rules:
      - Only create lane=bug and kind=BUG findings.
      - version_bump must be patch.
      - requires_user_confirmation must be false.
      - Every finding must include exactly one stable module name.
      - Every finding must include small, executable work_items.
      - Every bug work_item must include review_role, qa_role, allowed_paths, tests, acceptance, reproduction_steps, test_case_files, verification_steps, and worktree_hint. owner_role will be normalized to Coding-Agent by the runtime.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Current version: {current_version}

      Bug scan result:
      {bug_scan}

      Repository context:
      {repo_context_blob}
    expected_output: Final UpgradePlan JSON for bug finding.
  - task_id: review_plan
    kind: crewai_task
    agent_id: reviewer
    output_model: UpgradePlan
    inputs:
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
      draft_plan: $tasks.draft_plan.outputs.raw
    description_template: |
      Review the drafted bug UpgradePlan and return corrected UpgradePlan JSON.
      Rules:
      - Reject large, vague, or weakly evidenced bugs.
      - Keep only issue-scoped work_items with explicit path scope and validation steps.
      - Preserve only lane=bug findings.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Draft plan:
      {draft_plan}

      Repository context:
      {repo_context_blob}
    expected_output: Reviewed UpgradePlan JSON.
  - task_id: qa_gate
    kind: crewai_task
    agent_id: qa_gate
    output_model: UpgradePlan
    inputs:
      reviewed_plan: $tasks.review_plan.outputs.raw
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
    description_template: |
      Finalize the reviewed bug UpgradePlan from a QA and release perspective and return UpgradePlan JSON.
      Rules:
      - Keep only bugs with explicit acceptance, tests, reproduction_steps, and verification_steps.
      - Ensure work_items are small enough for a single coding agent.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Reviewed plan:
      {reviewed_plan}

      Repository context:
      {repo_context_blob}
    expected_output: QA-approved UpgradePlan JSON.
  - task_id: materialize_plan
    kind: skill
    skill_id: planning.materialize-findings
    inputs:
      plan: $tasks.qa_gate.outputs.json
      project_id: $tasks.prepare_context.outputs.project_id
      target_id: $tasks.prepare_context.outputs.target_id
      repo_root: $tasks.prepare_context.outputs.repo_root
      repo_locator: $tasks.prepare_context.outputs.repo_locator
      current_version: $tasks.prepare_context.outputs.current_version
      bug_scan_policy: $tasks.prepare_context.outputs.bug_scan_policy
