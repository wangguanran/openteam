workflow_id: feature-finding
lane: feature
phase: finding
display_name_zh: 功能发现流程
enabled: true
description: Discover feature opportunities and create proposals for review.
task_source: proposal
requires_user_confirmation: true
materialize_requires_approval: true
default_version_bump: minor
baseline_action_default: feature_followup
baseline_action_by_bump:
  major: new_baseline
  minor: new_baseline
stages:
  - planning
runtime_policy:
  max_candidates: 5
  active_window_start_hour: 0
  active_window_end_hour: 24
  max_continuous_runtime_minutes: 0
  cooldown_hours: 1
loop:
  enabled: true
  run_on_startup: true
  interval_sec: 300
  initial_delay_sec: 60
  concurrency: 1
  target_selector: enabled_targets
  max_units_per_tick: 1
process:
  mode: sequential
  verbose: false
agents:
  - agent_id: scanner
    role_id: Product-Manager
  - agent_id: drafter
    role_id: Issue-Drafter
  - agent_id: reviewer
    role_id: Plan-Review-Agent
  - agent_id: qa_gate
    role_id: Plan-QA-Agent
tasks:
  - task_id: prepare_context
    kind: skill
    skill_id: repo.collect-context
  - task_id: feature_scan
    kind: crewai_task
    agent_id: scanner
    inputs:
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
      max_findings: $tasks.prepare_context.outputs.max_findings
    description_template: |
      Analyze the repository context as a product manager and propose feature opportunities.
      Rules:
      - Return at most {max_findings} high-value feature ideas or product improvements. If max_findings is 0, return every well-supported idea.
      - Focus on user-visible value and product capability improvements.
      - Mention likely major or minor release impact when relevant.
      - Keep the response concise and use Simplified Chinese for user-facing text.

      Repository context:
      {repo_context_blob}
    expected_output: A concise shortlist of feature candidates with evidence.
  - task_id: draft_plan
    kind: crewai_task
    agent_id: drafter
    output_model: UpgradePlan
    inputs:
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
      feature_scan: $tasks.feature_scan.outputs.raw
      current_version: $tasks.prepare_context.outputs.current_version
    description_template: |
      Transform the feature scan result into an UpgradePlan JSON.
      Rules:
      - Only create lane=feature and kind=FEATURE findings.
      - version_bump must be major or minor.
      - requires_user_confirmation must be true.
      - materialization requires approval.
      - Every finding must include exactly one stable module name.
      - Every work_item must stay small, executable, and include owner_role, review_role, qa_role, allowed_paths, tests, acceptance, and worktree_hint.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Current version: {current_version}

      Feature scan result:
      {feature_scan}

      Repository context:
      {repo_context_blob}
    expected_output: UpgradePlan JSON for feature finding.
  - task_id: review_plan
    kind: crewai_task
    agent_id: reviewer
    output_model: UpgradePlan
    inputs:
      draft_plan: $tasks.draft_plan.outputs.raw
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
    description_template: |
      Review the drafted feature UpgradePlan and return corrected UpgradePlan JSON.
      Rules:
      - Reject vague product ideas and oversized implementation scopes.
      - Keep only lane=feature findings.
      - Ensure every work_item has explicit path scope and downstream review/QA roles.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Draft plan:
      {draft_plan}

      Repository context:
      {repo_context_blob}
    expected_output: Reviewed UpgradePlan JSON.
  - task_id: qa_gate
    kind: crewai_task
    agent_id: qa_gate
    output_model: UpgradePlan
    inputs:
      reviewed_plan: $tasks.review_plan.outputs.raw
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
    description_template: |
      Finalize the reviewed feature UpgradePlan from a QA and release perspective and return UpgradePlan JSON.
      Rules:
      - Feature findings must remain pending approval before coding.
      - Every work_item must have tests and acceptance.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Reviewed plan:
      {reviewed_plan}

      Repository context:
      {repo_context_blob}
    expected_output: QA-approved UpgradePlan JSON.
  - task_id: materialize_plan
    kind: skill
    skill_id: planning.materialize-findings
    inputs:
      plan: $tasks.qa_gate.outputs.json
      project_id: $tasks.prepare_context.outputs.project_id
      target_id: $tasks.prepare_context.outputs.target_id
      repo_root: $tasks.prepare_context.outputs.repo_root
      repo_locator: $tasks.prepare_context.outputs.repo_locator
      current_version: $tasks.prepare_context.outputs.current_version
