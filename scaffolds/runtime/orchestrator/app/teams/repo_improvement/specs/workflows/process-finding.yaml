workflow_id: process-finding
lane: process
phase: finding
display_name_zh: 流程发现流程
enabled: true
description: Discover runtime and delivery process improvements.
task_source: proposal
requires_user_confirmation: false
materialize_requires_approval: false
materialize_blocked_statuses:
  - REJECTED
  - HOLD
  - MATERIALIZED
default_version_bump: none
baseline_action_default: process_improvement
stages:
  - planning
runtime_policy:
  max_candidates: 3
  active_window_start_hour: 0
  active_window_end_hour: 24
  max_continuous_runtime_minutes: 0
  cooldown_hours: 24
loop:
  enabled: true
  run_on_startup: true
  interval_sec: 300
  initial_delay_sec: 60
  concurrency: 1
  target_selector: enabled_targets
  max_units_per_tick: 1
process:
  mode: sequential
  verbose: false
agents:
  - agent_id: scanner
    role_id: Process-Optimization-Analyst
  - agent_id: drafter
    role_id: Issue-Drafter
  - agent_id: reviewer
    role_id: Plan-Review-Agent
  - agent_id: qa_gate
    role_id: Plan-QA-Agent
tasks:
  - task_id: prepare_context
    kind: skill
    skill_id: team.collect-context
  - task_id: process_scan
    kind: crewai_task
    agent_id: scanner
    inputs:
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
      max_findings: $tasks.prepare_context.outputs.max_findings
    description_template: |
      Review the repository context and recent execution signals as a process optimization analyst.
      Rules:
      - Return at most {max_findings} process improvements grounded in runtime friction, failed handoffs, delivery bottlenecks, or repeated waste.
      - Prefer a few high-value improvements over many weak ones.
      - Keep the response concise and use Simplified Chinese for user-facing text.

      Repository context:
      {repo_context_blob}
    expected_output: A concise shortlist of process improvements.
  - task_id: draft_plan
    kind: crewai_task
    agent_id: drafter
    output_model: UpgradePlan
    inputs:
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
      process_scan: $tasks.process_scan.outputs.raw
      current_version: $tasks.prepare_context.outputs.current_version
    description_template: |
      Transform the process scan result into an UpgradePlan JSON.
      Rules:
      - Only create lane=process and kind=PROCESS findings.
      - version_bump must be none.
      - requires_user_confirmation must be false.
      - Keep work_items small, executable, and scoped.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Current version: {current_version}

      Process scan:
      {process_scan}

      Repository context:
      {repo_context_blob}
    expected_output: UpgradePlan JSON for process finding.
  - task_id: review_plan
    kind: crewai_task
    agent_id: reviewer
    output_model: UpgradePlan
    inputs:
      draft_plan: $tasks.draft_plan.outputs.raw
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
    description_template: |
      Review the drafted process UpgradePlan and return corrected UpgradePlan JSON.
      Rules:
      - Reject vague or unmeasurable process changes.
      - Keep only lane=process findings.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Draft plan:
      {draft_plan}

      Repository context:
      {repo_context_blob}
    expected_output: Reviewed UpgradePlan JSON.
  - task_id: qa_gate
    kind: crewai_task
    agent_id: qa_gate
    output_model: UpgradePlan
    inputs:
      reviewed_plan: $tasks.review_plan.outputs.raw
      repo_context_blob: $tasks.prepare_context.outputs.repo_context_blob
    description_template: |
      Finalize the reviewed process UpgradePlan and return UpgradePlan JSON.
      Rules:
      - Ensure every work_item has explicit success criteria.
      - Process findings may materialize automatically once due.
      - Keep all user-facing natural language fields in Simplified Chinese.

      Reviewed plan:
      {reviewed_plan}

      Repository context:
      {repo_context_blob}
    expected_output: QA-approved UpgradePlan JSON.
  - task_id: materialize_plan
    kind: skill
    skill_id: team.materialize-findings
    inputs:
      plan: $tasks.qa_gate.outputs.json
      project_id: $tasks.prepare_context.outputs.project_id
      target_id: $tasks.prepare_context.outputs.target_id
      repo_root: $tasks.prepare_context.outputs.repo_root
      repo_locator: $tasks.prepare_context.outputs.repo_locator
      current_version: $tasks.prepare_context.outputs.current_version
