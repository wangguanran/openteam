workflow_id: repo-coding
engine: ""
lane: shared
phase: coding
display_name_zh: 通用编码流程
enabled: true
description: Deliver queued team tasks through the common audit, proof, coding, review, QA, and release pipeline.
task_source: direct_task
requires_user_confirmation: false
materialize_requires_approval: false
default_version_bump: none
baseline_action_default: coding
stages:
  - delivery
runtime_policy:
  max_candidates: 1
  active_window_start_hour: 0
  active_window_end_hour: 24
  max_continuous_runtime_minutes: 0
loop:
  enabled: true
  run_on_startup: false
  interval_sec: 180
  initial_delay_sec: 45
  concurrency: 1
  target_selector: enabled_targets
  max_units_per_tick: 1
process:
  mode: sequential
  verbose: false
agents:
  - agent_id: scheduler
    role_id: Scheduler-Agent
  - agent_id: owner
    role_id: Coding-Agent
    backstory: "You are a senior full-stack developer who implements approved tasks with discipline, running validation before completing."
  - agent_id: reviewer
    role_id: Review-Agent
    backstory: "You review code like a mentor, not a gatekeeper. Every comment teaches something. Focus on correctness, security, maintainability."
  - agent_id: qa_gate
    role_id: QA-Agent
    backstory: "You are the QA gate. If tests fail or acceptance is weak, you block release and send the task back."
  - agent_id: docs
    role_id: Documentation-Agent
    backstory: "You update repository documentation, operator runbooks, and release notes to match the actual delivered behavior."
  - agent_id: release
    role_id: Release-Agent
    backstory: "You take the validated diff, preserve branch hygiene, and fail safely when release constraints are not met."
tasks:
  - task_id: delivery_pipeline
    kind: skill
    skill_id: team.run-coding-pipeline
