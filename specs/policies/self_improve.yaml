schema_version: 1

# Always-on self-improve policy (deterministic; no LLM).
# This policy controls the host-level daemon in:
# - scripts/pipelines/self_improve_daemon.py
#
# Notes:
# - "leader_only" enforces cluster governance: only the Brain(leader) may write truth sources.
# - "dry_run_remote" keeps GitHub Projects sync as view-layer safe by default.
# - Runtime state is stored under `../team-os-runtime/state/` (or TEAMOS_RUNTIME_ROOT).

self_improve:
  enabled: true
  leader_only: true

  # Scheduler
  interval_sec: 3600          # wake frequency (1h)
  debounce_sec: 21600         # minimum time between write iterations (6h)
  min_proposals_per_run: 3

  # Writes
  write_proposal_md: true     # ../team-os-runtime/state/teamos/self_improve/proposals/<ts>-proposal.md
  write_requirements: false   # keep startup idempotent; static asset updates should go through explicit Team-OS tasks

  # Roadmap sync (GitHub Projects v2 is view-layer). Off by default.
  panel_sync:
    enabled: true
    mode: full                # incremental|full
    dry_run: true

  # Dedupe (avoid repeating the same proposals too frequently)
  dedupe:
    enabled: true
    max_keys: 300
