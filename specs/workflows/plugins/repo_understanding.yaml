schema_version: 1
plugin_id: "repo_understanding"
version: "0.1"
last_updated: "2026-02-16"

description: >
  Gate for non-empty repos: before any code changes in "upgrade" mode,
  the system must produce a repo understanding document with evidence.

triggers:
  any:
    - field: "task.mode"
      op: "eq"
      value: "upgrade"

attached_to_stages: ["plan"]

roles:
  primary: ["Architect"]
  supporting: ["Developer-Backend", "Developer-Web", "Developer-AI", "Reviewer"]

required_artifacts:
  - "docs/product/openteam/REPO_UNDERSTANDING.md"

gates:
  - id: "no_code_change_before_understanding"
    policy: "BLOCK"
    condition: "artifact_missing"
    message: "Repo is non-empty and mode=upgrade; must create docs/product/openteam/REPO_UNDERSTANDING.md before any modifications."

acceptance:
  must_include_sections:
    - "总体架构"
    - "模块边界"
    - "关键目录"
    - "构建方式"
    - "测试命令"
    - "依赖/环境"
    - "风险点"
    - "改动建议"
    - "回滚思路"
  evidence_required:
    - "tree/ls output"
    - "rg results"
    - "build script paths"
