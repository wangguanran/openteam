id: "<TASK_ID>"
title: "<TITLE>"
project_id: "openteam" # scope=openteam (OpenTeam self). Project scopes must live in Workspace (outside this repo).
workstream_id: "general" # workstream registry: .openteam/state/workstreams.yaml
status: "intake" # intake|plan|todo|doing|test|release|observe|retro|closed (aliases: work|running -> doing)
risk_level: "R1" # R0|R1|R2|R3
need_pm_decision: false
repo:
  locator: ""      # owner/name, url, or local path (optional)
  workdir: ""      # local checkout path (optional)
  branch: ""       # working branch (optional)
  mode: "auto"     # auto|bootstrap|upgrade
checkpoint:
  stage: "intake"
  last_event_ts: "<YYYY-MM-DDTHH:MM:SSZ>"
recovery:
  last_scan_at: ""
  last_resume_at: ""
  notes: ""
approvals_required:
  - "R2/R3 actions"
owners:
  - "PM-Intake"
roles_involved:
  - "PM-Intake"
workflows:
  - "Genesis"
created_at: "<YYYY-MM-DDTHH:MM:SSZ>"
updated_at: "<YYYY-MM-DDTHH:MM:SSZ>"
links:
  pr: ""
  issue: ""
artifacts:
  ledger: ".openteam/ledger/tasks/<TASK_ID>.yaml"
  logs_dir: ".openteam/logs/tasks/<TASK_ID>/"
evidence:
  - type: "log"
    path: ".openteam/logs/tasks/<TASK_ID>/00_intake.md"
