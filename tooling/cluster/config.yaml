schema_version: 1

# OpenTeam Cluster configuration (GitHub-first bus).
# Secrets must NOT be stored here. Tokens/passwords must come from env/stdin.
#
# Design principles:
# - GitHub Projects is view-layer; truth is still ledger/requirements/runtime DB.
# - Prevent split-brain: only the elected leader (Brain) performs write operations
#   that change "truth" or panels (requirements writes, focus writes, Projects sync, repo create).
#
# NOTE: Remote write operations must be explicitly enabled via env gates.

cluster:
  enabled: true
  bus: "github_issues"     # github_issues | (future) postgres | (future) redis

  # The repo used to host cluster control issues (CLUSTER-LEADER / CLUSTER-NODES).
  # Convention: use the OpenTeam repo (this repo) unless you want a dedicated "cluster-bus" repo.
  cluster_repo: "openteam-dev/openteam"

  leader_lease:
    issue_title: "CLUSTER-LEADER"
    lease_ttl_sec: 60
    renew_interval_sec: 30
    grace_sec: 30
    # Leader writes enabled gate (remote write).
    write_enable_env: "OPENTEAM_GH_CLUSTER_WRITE_ENABLED"   # set to "1" to allow lease writes

  nodes_registry:
    issue_title: "CLUSTER-NODES"
    heartbeat_interval_sec: 60
    # Nodes registry updates are remote writes.
    write_enable_env: "OPENTEAM_GH_CLUSTER_WRITE_ENABLED"

  task_lease:
    lease_ttl_sec: 600          # 10 minutes
    renew_interval_sec: 300     # 5 minutes
    write_enable_env: "OPENTEAM_GH_CLUSTER_WRITE_ENABLED"

  recovery:
    scan_interval_sec: 60
    # Where to write recovery snapshots (gitignored by default)
    state_dir: "tooling/cluster/state"

github:
  # Authentication:
  # - recommended: use gh CLI on each node (`gh auth login`) OR set env GITHUB_TOKEN/GH_TOKEN
  # - never commit tokens
  token_envs: ["GITHUB_TOKEN", "GH_TOKEN"]
  graphql_api_url: "https://api.github.com/graphql"
  rest_api_url: "https://api.github.com"

node:
  role_preference: "auto"        # brain | assistant | auto
  capabilities: ["repo_rw", "docker"]   # declare what this node can do
  tags: ["site:local"]

resources_guard:
  policy_path: "specs/policies/agent_concurrency.yaml"
  snapshot_interval_sec: 60

